<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13100C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C160F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent circles -->
  <circle cx="1100" cy="-100" r="250" fill="rgba(192,82,40,0.08)" />
  <circle cx="80" cy="650" r="200" fill="rgba(217,154,60,0.06)" />
  
  <!-- Main card background -->
  <rect x="120" y="100" width="960" height="430" rx="32" fill="#F5EDE0"/>
  
  <!-- Decorative left accent -->
  <rect x="120" y="100" width="12" height="430" rx="6" fill="#C05228"/>
  
  <!-- Main title -->
  <text x="600" y="200" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" text-anchor="middle" fill="#2A180C" letter-spacing="-1">Cups to</text>
  
  <!-- Colored title parts -->
  <text x="850" y="200" font-family="'Playfair Display', Georgia, serif" font-size="72" font-weight="700" text-anchor="start" fill="#C05228" letter-spacing="-1">Grams</text>
  
  <!-- Subtitle -->
  <text x="600" y="270" font-family="'DM Sans', sans-serif" font-size="48" font-weight="600" text-anchor="middle" fill="#2A180C">Converter</text>
  
  <!-- Feature bullets -->
  <g font-family="'DM Sans', sans-serif" font-size="20" font-weight="500" fill="#5A3A24">
    <text x="180" y="340">✓ 21 Ingredients</text>
    <text x="180" y="385">✓ Instant Conversion</text>
    <text x="180" y="430">✓ Zero Guessing</text>
    
    <text x="680" y="340">✓ Cups ⇌ Grams</text>
    <text x="680" y="385">✓ Ounces & mL</text>
    <text x="680" y="430">✓ Free, No Account</text>
  </g>
  
  <!-- Brand line -->
  <text x="600" y="490" font-family="'DM Sans', sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#8C6A4E">Precision Kitchen Conversions by GramScale</text>
  
  <!-- Bottom accent bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#C05228"/>
  <text x="600" y="610" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="600" text-anchor="middle" fill="#F5EDE0">cuptogramsconverter.com</text>
</svg>
